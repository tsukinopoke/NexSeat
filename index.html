<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSeat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0c0c0f;--surface:#131318;--surface2:#1a1a22;--surface3:#22222e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-dim:rgba(108,92,231,0.14);--accent-glow:rgba(108,92,231,0.35);
  --text:#eeecff;--text2:#9994b8;--text3:#4e4a68;
  --green:#00cec9;--green-dim:rgba(0,206,201,0.12);
  --red:#ff7675;--red-dim:rgba(255,118,117,0.12);
  --amber:#fdcb6e;--amber-dim:rgba(253,203,110,0.12);
  --lock-color:#fd79a8;--pin-color:#55efc4;--pin-dim:rgba(85,239,196,0.14);
  --radius:8px;--user-bg:#0c0c0f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--user-bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;transition:background .4s}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);background:rgba(19,19,24,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.06em;flex-shrink:0}
.logo-mark{width:24px;height:24px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 0 10px var(--accent-glow)}
.header-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);font-size:11px;font-weight:600;font-family:'Syne',sans-serif;letter-spacing:.04em;cursor:pointer;transition:all .14s;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.success{color:var(--green);border-color:rgba(0,206,201,.3)}
.btn.success:hover{background:var(--green-dim)}
.btn.danger{color:var(--red);border-color:rgba(255,118,117,.3)}
.btn.danger:hover{background:var(--red-dim)}
.btn.sm{padding:4px 9px;font-size:10px}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--surface2);border-color:var(--border)}
.main{display:flex;height:calc(100vh - 50px);overflow:hidden}
.sidebar{width:268px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.content{flex:1;overflow-y:auto;padding:15px 18px}
.sb-section{padding:12px;border-bottom:1px solid var(--border)}
.sb-title{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.chip-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.chip{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .13s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent2)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.venue-cfg{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px;margin-bottom:8px}
.cfg-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.cfg-cell{display:flex;flex-direction:column;gap:2px}
.cfg-cell label{font-size:9px;color:var(--text3);font-family:'Syne',sans-serif;letter-spacing:.05em;text-transform:uppercase}
.cfg-cell input{width:100%;padding:5px 4px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center}
.cfg-cell input:focus{outline:none;border-color:var(--accent)}
.hint{font-size:10px;font-family:'JetBrains Mono',monospace;min-height:14px;margin-top:4px;line-height:1.5;color:var(--text3)}
.hint.ok{color:var(--green)}.hint.warn{color:var(--amber)}.hint.err{color:var(--red)}
.mix-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 9px;margin-top:6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2);line-height:1.7;display:none}
.mix-box.show{display:block}
.dropzone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:13px 10px;text-align:center;cursor:pointer;transition:all .18s;margin-bottom:7px}
.dropzone:hover,.dropzone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.dropzone-icon{font-size:18px;margin-bottom:3px}
.dropzone p{font-size:10px;color:var(--text2);line-height:1.4}
.dropzone strong{color:var(--accent2)}
.participant-list{max-height:150px;overflow-y:auto}
.participant-chip{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:5px;margin-bottom:2px;background:var(--surface2);font-size:11px;color:var(--text);cursor:grab;user-select:none}
.participant-chip:hover{background:var(--surface3)}
.participant-chip.placed{color:var(--text3);cursor:default}
.participant-chip.placed .chip-name{text-decoration:line-through}
.chip-no{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-width:18px}
.chip-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stat-card{background:var(--surface2);border-radius:var(--radius);padding:8px;border:1px solid var(--border)}
.stat-card .num{font-size:17px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.stat-card .lbl{font-size:9px;color:var(--text3);font-family:'Syne',sans-serif;letter-spacing:.05em}
.stat-card.accent{border-color:rgba(108,92,231,.3);background:var(--accent-dim)}
.stat-card.accent .num{color:var(--accent2)}
.bg-swatches{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.bg-swatch{width:21px;height:21px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .14s}
.bg-swatch:hover,.bg-swatch.active{border-color:var(--accent2);transform:scale(1.12)}
.bg-row{display:flex;gap:6px;align-items:center}
.bg-row input[type=color]{width:26px;height:26px;border-radius:5px;border:1px solid var(--border2);background:none;cursor:pointer;padding:2px}
.bg-row input[type=text]{flex:1;padding:4px 7px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px}
.bg-row input:focus{outline:none;border-color:var(--accent)}
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px}
.mc{display:flex;flex-direction:column;gap:2px}
.mc label{font-size:9px;color:var(--text3);font-family:'Syne',sans-serif;text-transform:uppercase}
.mc input{width:100%;padding:5px 4px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center}
.mc input:focus{outline:none;border-color:var(--accent)}
.venue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:6px}
.venue-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.venue-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.stage-bar{background:linear-gradient(90deg,transparent,var(--accent-dim),rgba(162,155,254,.1),var(--accent-dim),transparent);border:1px solid rgba(108,92,231,.2);border-radius:var(--radius);padding:6px 16px;text-align:center;font-family:'Syne',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--accent2);margin-bottom:11px;font-weight:700;text-transform:uppercase}
.row-block{margin-bottom:7px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.row-block:hover{border-color:var(--border2)}
.row-header{display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--surface2);border-bottom:1px solid var(--border)}
.row-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.06em}
.row-info{font-size:10px;color:var(--text3)}
.row-actions{display:flex;gap:3px;margin-left:auto}
.row-tables{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px}
.table-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:7px;position:relative;transition:border-color .14s}
.table-card:hover{border-color:rgba(108,92,231,.3)}
.table-card.locked-table{border-color:rgba(253,121,168,.35);background:rgba(253,121,168,.04)}
.tc-head{display:flex;align-items:center;gap:3px;margin-bottom:6px}
.tc-name{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;color:var(--text2);background:transparent;border:none;flex:1;min-width:0;outline:none}
.tc-name:focus{color:var(--text)}
.tc-btn{color:var(--text3);cursor:pointer;font-size:10px;padding:2px 3px;border-radius:3px;transition:all .1s;background:none;border:none}
.tc-btn:hover{background:var(--surface3)}
.tc-btn.del:hover{color:var(--red)}
.tc-btn.lock-btn.active{color:var(--lock-color)}
.seats-grid{display:grid;gap:3px}
.seat{width:58px;min-height:34px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all .13s;position:relative;font-family:'Noto Sans JP',sans-serif;font-weight:500;overflow:hidden;text-align:center;padding:3px 4px}
.seat:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim)}
.seat.filled{background:var(--accent-dim);border-color:rgba(108,92,231,.5);color:var(--accent2)}
.seat.pinned{border-color:var(--pin-color)!important;background:var(--pin-dim)!important;color:var(--pin-color)!important}
.seat.pinned::after{content:'📍';position:absolute;top:1px;right:2px;font-size:7px;line-height:1}
.seat.drop-target{border-color:var(--green);background:var(--green-dim)}
.seat.swap-src{border-color:var(--amber);background:var(--amber-dim);animation:psw .6s ease infinite}
@keyframes psw{0%,100%{box-shadow:0 0 0 0 rgba(253,203,110,.4)}50%{box-shadow:0 0 0 4px rgba(253,203,110,0)}}
.seat-name{display:block;width:100%;word-break:break-all;overflow-wrap:break-word;line-height:1.25;font-size:9px}
.seat-name.long{font-size:7.5px;letter-spacing:-.2px}
.tc-footer{display:flex;align-items:center;gap:3px;margin-top:6px;flex-wrap:wrap}
.tc-layout-sel{font-size:9px;padding:2px 4px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-family:'JetBrains Mono',monospace;cursor:pointer}
.mode-banner{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid;border-radius:12px;padding:7px 14px;font-size:12px;z-index:200;display:none;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(0,0,0,.5);font-family:'Syne',sans-serif;font-weight:600;white-space:nowrap}
.mode-banner.active{display:flex}
.mode-banner.swap{border-color:var(--amber);color:var(--amber)}
.mode-banner.tswap{border-color:var(--lock-color);color:var(--lock-color)}
.mode-status{font-weight:400;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text2)}
.edit-popup{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px;z-index:300;min-width:200px;max-width:245px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none}
.edit-popup-title{font-family:'Syne',sans-serif;font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:600}
.edit-popup input[type=text]{width:100%;padding:7px 9px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;margin-bottom:7px}
.edit-popup input:focus{outline:none;border-color:var(--accent)}
.opt-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:10px;cursor:pointer;text-align:center;transition:all .12s;font-family:'Syne',sans-serif;font-weight:600;margin-bottom:7px;width:100%}
.opt-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-dim)}
.opt-btn.active{border-color:var(--pin-color);background:var(--pin-dim);color:var(--pin-color)}
.suggest-list{max-height:95px;overflow-y:auto;margin-bottom:6px}
.suggest-item{padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--text2);transition:background .1s}
.suggest-item:hover{background:var(--accent-dim);color:var(--accent2)}
.edit-btns{display:flex;gap:4px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;margin-bottom:12px}
.tab-btn{padding:5px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;letter-spacing:.05em;transition:all .14s}
.tab-btn.active{background:var(--accent-dim);color:var(--accent2)}
.tab-btn:hover:not(.active){color:var(--text2);background:var(--surface2)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.list-table{width:100%;border-collapse:collapse;font-size:11px}
.list-table th{text-align:left;padding:5px 9px;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border)}
.list-table td{padding:5px 9px;border-bottom:1px solid var(--border);color:var(--text)}
.list-table tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;font-family:'Syne',sans-serif}
.badge.filled{background:var(--accent-dim);color:var(--accent2)}
.badge.empty{background:var(--surface2);color:var(--text3)}
.badge.pin{background:var(--pin-dim);color:var(--pin-color)}
.toast{position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 13px;font-size:11px;color:var(--text);z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;font-family:'Syne',sans-serif;font-weight:600}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(0,206,201,.4);color:var(--green)}
.toast.error{border-color:rgba(255,118,117,.4);color:var(--red)}
.add-row-area{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px dashed var(--border);margin-top:4px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
/* capture target for image export */
#venueCapture{background:var(--user-bg)}
@media print{
  body{background:#fff!important;color:#000;font-size:11px}
  .header,.sidebar,.add-row-area,.row-actions,.tc-footer,.venue-header,.tc-btn,.mode-banner,.tabs,#tab-list,.edit-popup{display:none!important}
  .main{display:block;height:auto;overflow:visible}
  .content{padding:4px;overflow:visible;height:auto}
  #tab-layout{display:block!important}
  .stage-bar{background:#f0ecff!important;color:#534AB7;border:1px solid #9b8eff;padding:4px;font-size:9px;margin-bottom:6px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .row-block{border:1px solid #ccc;break-inside:avoid;margin-bottom:4px;border-radius:4px;overflow:hidden}
  .row-header{background:#f5f5f5!important;padding:3px 7px}
  .row-label,.row-info{font-size:9px;color:#555}
  .row-tables{gap:4px;padding:5px 6px}
  .table-card{background:#fafafa!important;border:1px solid #ccc;border-radius:4px;padding:5px;break-inside:avoid}
  .tc-head{margin-bottom:4px}
  .tc-name{font-size:9px;color:#333}
  .seats-grid{gap:2px}
  .seat{width:52px!important;min-height:28px!important;border:1px solid #bbb;background:#f4f4f4!important;color:#333;border-radius:3px;padding:2px 3px}
  .seat.filled{background:#ede8ff!important;border-color:#9b8eff!important;color:#3d2fb3!important;print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .seat.pinned{background:#d4fff6!important;border-color:#00b894!important;color:#007a5e!important;print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .seat.pinned::after{display:none}
  .seat-name{font-size:8px!important}
  .seat-name.long{font-size:7px!important}
  @page{margin:8mm;size:A4 landscape}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><div class="logo-mark">N</div>NexSeat</div>
  <div class="header-actions">
    <span id="autosave-label" style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">—</span>
    <button class="btn sm" onclick="exportCSV()">↓ CSV</button>
    <button class="btn sm" onclick="document.getElementById('restoreCsvIn').click()">↺ 復元</button>
    <input type="file" id="restoreCsvIn" accept=".csv" style="display:none" onchange="restoreFromCSV(event)">
    <button class="btn sm primary" onclick="window.print()">⊞ 印刷</button>
  </div>
</div>

<div class="mode-banner swap" id="swapBanner">
  <span>⇄ 個人入れ替え</span>
  <span class="mode-status" id="swapStatus">1人目の席をクリック</span>
  <button class="btn sm danger" onclick="cancelMode()">キャンセル</button>
</div>
<div class="mode-banner tswap" id="tSwapBanner">
  <span>🔄 卓ごと入れ替え</span>
  <span class="mode-status" id="tSwapStatus">入れ替える卓をクリック</span>
  <button class="btn sm danger" onclick="cancelMode()">キャンセル</button>
</div>

<div class="main">
<div class="sidebar">

  <!-- CSV/Excel Import -->
  <div class="sb-section">
    <div class="sb-title">参加者インポート</div>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('csvInput').click()">
      <div class="dropzone-icon">📂</div>
      <p><strong>CSV / Excel / スプシ</strong><br>ドロップまたはクリック</p>
    </div>
    <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(event)">
    <div id="participantArea" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <span id="participantCount" style="font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace"></span>
      </div>
      <div class="participant-list" id="participantList"></div>
    </div>
  </div>

  <!-- Venue config -->
  <div class="sb-section">
    <div class="sb-title">会場設定</div>
    <div class="venue-cfg">
      <div class="cfg-row">
        <div class="cfg-cell"><label>横（卓数）</label><input type="number" id="cfgCols" min="1" max="20" placeholder="自動"></div>
        <div class="cfg-cell"><label>縦（列数）</label><input type="number" id="cfgRows" min="1" max="40" placeholder="自動"></div>
        <div class="cfg-cell"><label>総卓数</label><input type="number" id="cfgTotal" min="1" max="300" placeholder="自動"></div>
      </div>
      <div class="hint" id="cfgHint">入力した分だけ固定、残りは自動</div>
    </div>

    <div style="font-size:10px;color:var(--text2);margin-bottom:5px">1卓あたりの席数（複数選択で混合）</div>
    <div class="chip-row" id="seatChips">
      <div class="chip" data-n="2" onclick="toggleSeat(this)">2人</div>
      <div class="chip" data-n="3" onclick="toggleSeat(this)">3人</div>
      <div class="chip" data-n="4" onclick="toggleSeat(this)">4人</div>
      <div class="chip" data-n="5" onclick="toggleSeat(this)">5人</div>
      <div class="chip active" data-n="6" onclick="toggleSeat(this)">6人</div>
      <div class="chip" data-n="7" onclick="toggleSeat(this)">7人</div>
      <div class="chip" data-n="8" onclick="toggleSeat(this)">8人</div>
    </div>
    <div class="hint" id="mixHint"></div>
    <div class="mix-box" id="mixBox"></div>

    <div style="display:flex;gap:5px;margin-top:8px">
      <button class="btn primary" style="flex:1;padding:8px" onclick="autoAssign()">⚡ 自動割り当て</button>
      <button class="btn success" style="flex:1;padding:8px" onclick="reshuffleAssign()">🔀 再シャッフル</button>
    </div>
  </div>

  <!-- Stats -->

<script>
// ── State ─────────────────────────────────────────────
let rows=[],participants=[],pinnedSeats={},lockedTables={};
let selectedSeats=new Set([6]); // multi-select seat counts
let editTarget=null,dragParticipant=null,mode=null,swapSrc=null,tSwapSrc=null;
const LS_KEY='nexseat_v4';let saveTimer=null;

const LAYOUTS={
  '1x2':{c:1,r:2},'2x1':{c:2,r:1},'1x3':{c:1,r:3},'3x1':{c:3,r:1},
  '2x2':{c:2,r:2},'4x1':{c:4,r:1},'1x4':{c:1,r:4},
  '1x5':{c:1,r:5},'5x1':{c:5,r:1},
  '2x3':{c:2,r:3},'3x2':{c:3,r:2},'6x1':{c:6,r:1},'1x6':{c:1,r:6},
  '1x7':{c:1,r:7},'7x1':{c:7,r:1},
  '2x4':{c:2,r:4},'4x2':{c:4,r:2},'8x1':{c:8,r:1},'1x8':{c:1,r:8},
};

function layoutFor(n){
  if(n<=2)return'2x1';if(n===3)return'3x1';if(n===4)return'2x2';
  if(n===5)return'5x1';if(n===6)return'2x3';if(n===7)return'1x7';
  if(n===8)return'4x2';return'2x3';
}

// ── Seat count multi-select ───────────────────────────
function toggleSeat(el){
  const n=parseInt(el.dataset.n);
  if(selectedSeats.has(n)){
    if(selectedSeats.size===1)return; // keep at least one
    selectedSeats.delete(n);el.classList.remove('active');
  }else{
    selectedSeats.add(n);el.classList.add('active');
  }
  updateHints();
}

// ── Solve mixed seat distribution ────────────────────
// Given n people and allowed seat sizes, find combination of tables
// that fits everyone exactly (or as close as possible).
// Returns [{size,count},...] or null
function solveMix(n, sizes){
  if(sizes.length===0)return null;
  if(sizes.length===1){
    const s=sizes[0];
    const full=Math.floor(n/s);
    const rem=n%s;
    if(rem===0)return[{size:s,count:full}];
    return[{size:s,count:full},{size:rem,count:1}];
  }
  // Try all combinations of two sizes a,b: a*x + b*y = n
  // Minimise |x-y| (balance)
  const sorted=[...sizes].sort((a,b)=>a-b);
  let best=null,bestScore=Infinity;
  for(let i=0;i<sorted.length;i++){
    for(let j=i;j<sorted.length;j++){
      const a=sorted[i],b=sorted[j];
      // a*x+b*y=n, x>=0,y>=0
      for(let x=0;x<=Math.ceil(n/a);x++){
        const rem=n-a*x;
        if(rem<0)break;
        if(rem%b===0){
          const y=rem/b;
          const score=Math.abs(x-y);
          if(score<bestScore){bestScore=score;best=[{size:a,count:x},{size:b,count:y}].filter(t=>t.count>0);}
        }
      }
    }
  }
  if(best)return best;
  // Fallback: largest size + remainder
  const s=sorted[sorted.length-1];
  const full=Math.floor(n/s);
  const rem=n%s;
  const res=[{size:s,count:full}];
  if(rem>0)res.push({size:rem,count:1});
  return res;
}

// ── Venue config ──────────────────────────────────────
['cfgCols','cfgRows','cfgTotal'].forEach(id=>
  document.getElementById(id).addEventListener('input',updateHints));

function getCfg(){
  return{
    cols:parseInt(document.getElementById('cfgCols').value)||null,
    rows:parseInt(document.getElementById('cfgRows').value)||null,
    total:parseInt(document.getElementById('cfgTotal').value)||null,
  };
}

function updateHints(){
  const cfg=getCfg();
  const n=participants.filter(p=>!p.placed).length;
  const hintEl=document.getElementById('cfgHint');
  const mixBox=document.getElementById('mixBox');
  const mixHint=document.getElementById('mixHint');

  // cfg hint
  let totalT=null;
  if(cfg.total)totalT=cfg.total;
  else if(cfg.cols&&cfg.rows)totalT=cfg.cols*cfg.rows;
  const parts=[];
  if(cfg.cols)parts.push(`横${cfg.cols}卓`);
  if(cfg.rows)parts.push(`縦${cfg.rows}列`);
  if(totalT)parts.push(`計${totalT}卓`);
  hintEl.textContent=parts.length?parts.join(' · '):'入力した分だけ固定、残りは自動';
  hintEl.className='hint'+(parts.length?' ok':'');

  if(n===0){mixBox.classList.remove('show');mixHint.textContent='';return;}

  const sizes=[...selectedSeats].sort((a,b)=>a-b);
  const mix=solveMix(n,sizes);

  if(mix){
    const exact=mix.reduce((s,t)=>s+t.size*t.count,0)===n;
    const lines=mix.map(t=>`<span style="color:var(--accent2)">${t.size}人卓</span> × ${t.count}卓`);
    const totalMixT=mix.reduce((s,t)=>s+t.count,0);
    mixBox.innerHTML=lines.join('<br>')+`<br><span style="color:${exact?'var(--green)':'var(--amber)'}">計${totalMixT}卓 / ${exact?'ちょうど収まる':'端数あり'}</span>`;
    mixBox.classList.add('show');
    mixHint.textContent='';
  }else{
    mixBox.classList.remove('show');
    mixHint.textContent='計算中...';
  }
}

// ── File import (CSV / Excel / スプシ) ────────────────
function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){readExcel(f);}
  else{
    const r=new FileReader();
    r.onload=ev=>{const t=ev.target.result;isGarbled(t)?reread(f):parseCSVAuto(t);};
    r.readAsText(f,'UTF-8');
  }
  e.target.value='';
}

function readExcel(f){
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_csv(ws);
      parseCSVAuto(data);
    }catch(err){showToast('Excelの読み込みに失敗しました','error');}
  };
  r.readAsArrayBuffer(f);
}

function reread(f){const r=new FileReader();r.onload=ev=>parseCSVAuto(ev.target.result);r.readAsText(f,'UTF-16LE');}
function isGarbled(t){return(t.slice(0,500).match(/\uFFFD/g)||[]).length>5;}

const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('dragover');
  const f=e.dataTransfer.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){readExcel(f);return;}
  const r=new FileReader();r.onload=ev=>{const t=ev.target.result;isGarbled(t)?reread(f):parseCSVAuto(t);};r.readAsText(f,'UTF-8');
});

function parseCSVAuto(text){
  text=text.replace(/^\uFEFF/,'').replace(/^\xFF\xFE/,'');
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  if(lines.length<2){showToast('データが読み込めませんでした','error');return;}
  const headers=splitCSV(lines[0]);
  const fmt=headers.some(h=>h.includes('ステータス')||h.includes('エントリー'))?'tonemel':'startgg';
  const out=fmt==='tonemel'?parseTonemel(headers,lines):parseStartGG(headers,lines);
  participants=out;updateHints();renderParticipants();
  showToast(`${out.length}人を読み込みました（${fmt==='tonemel'?'Tonemel':'start.gg / スプシ'}）`,'success');
}

function parseTonemel(headers,lines){
  const idx=headers.indexOf('ステータス');const out=[];
  for(let i=1;i<lines.length;i++){
    const c=splitCSV(lines[i]);
    if((c[idx]||'')!=='出場')continue;
    let name='';
    for(let j=2;j<Math.min(c.length,15);j++){
      const v=c[j].trim();
      if(v&&!v.includes('はい')&&!v.includes('いいえ')&&!v.startsWith('@')&&!v.match(/^\d{4}-/)){name=v;break;}
    }
    if(!name)name=c[2]||c[1]||'不明';
    out.push({name:name.trim(),placed:false});
  }
  return out;
}

function parseStartGG(headers,lines){
  const lh=headers.map(h=>h.toLowerCase());
  let ni=lh.findIndex(h=>h.includes('gamertag'));
  if(ni<0)ni=lh.findIndex(h=>h==='name'||h.includes('participant name'));
  if(ni<0)ni=lh.findIndex(h=>h.includes('name'));
  if(ni<0)ni=1;
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=splitCSV(lines[i]);
    const name=(c[ni]||'').trim();
    if(name&&name!==headers[ni])out.push({name,placed:false});
  }
  return out;
}

function splitCSV(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"')inQ=!inQ;
    else if(ch===','&&!inQ){r.push(cur.trim());cur='';}
    else cur+=ch;
  }
  r.push(cur.trim());return r;
}

// ── Participants ──────────────────────────────────────
function renderParticipants(){
  const area=document.getElementById('participantArea');
  const list=document.getElementById('participantList');
  area.style.display='block';
  const placed=getAllPlaced();
  participants.forEach(p=>{p.placed=placed.includes(p.name);});
  document.getElementById('participantCount').textContent=
    `${participants.filter(p=>!p.placed).length}未配置 / ${participants.length}人`;
  list.innerHTML='';
  participants.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='participant-chip'+(p.placed?' placed':'');
    div.draggable=!p.placed;
    div.innerHTML=`<span class="chip-no">${i+1}</span><span class="chip-name" title="${p.name}">${p.name}</span>${p.placed?'<span style="font-size:9px;color:var(--green)">✓</span>':''}`;
    if(!p.placed){
      div.addEventListener('dragstart',e=>{dragParticipant=p.name;e.dataTransfer.effectAllowed='copy';});
      div.addEventListener('dragend',()=>{dragParticipant=null;});
    }
    list.appendChild(div);
  });
  updateHints();
}

function getAllPlaced(){
  const n=[];
  rows.forEach(r=>r.tables.forEach(t=>t.seats.forEach(s=>{if(s)n.push(s);})));
  return n;
}

// ── Auto assign ───────────────────────────────────────
function autoAssign(){
  const unplaced=participants.filter(p=>!p.placed).map(p=>p.name);
  if(!unplaced.length){showToast('配置できる参加者がいません','error');return;}

  const cfg=getCfg();
  const sizes=[...selectedSeats].sort((a,b)=>a-b);
  const mix=solveMix(unplaced.length,sizes);
  if(!mix){showToast('席数の組み合わせが計算できませんでした','error');return;}

  // Build table size list
  const tableSizes=[];
  mix.forEach(({size,count})=>{for(let i=0;i<count;i++)tableSizes.push(size);});

  // Shuffle names
  const names=[...unplaced];
  for(let i=names.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[names[i],names[j]]=[names[j],names[i]];}

  // Shuffle table order so sizes are interleaved
  for(let i=tableSizes.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tableSizes[i],tableSizes[j]]=[tableSizes[j],tableSizes[i]];}

  // Determine layout
  let cols,rowsN;
  const totalMixT=tableSizes.length;
  if(cfg.cols&&cfg.rows){cols=cfg.cols;rowsN=cfg.rows;}
  else if(cfg.cols){cols=cfg.cols;rowsN=Math.ceil(totalMixT/cols);}
  else if(cfg.rows){rowsN=cfg.rows;cols=Math.ceil(totalMixT/rowsN);}
  else if(cfg.total){cols=Math.min(4,cfg.total);rowsN=Math.ceil(cfg.total/cols);}
  else{cols=Math.min(4,totalMixT);rowsN=Math.ceil(totalMixT/cols);}

  rows=[];pinnedSeats={};lockedTables={};
  let nameIdx=0,tableCount=0;
  for(let ri=0;ri<rowsN;ri++){
    const rowId=Date.now()+ri+Math.random();
    const tables=[];
    for(let ci=0;ci<cols;ci++){
      const tIdx=tableCount++;
      if(tIdx>=tableSizes.length)break;
      const sz=tableSizes[tIdx];
      const seats=Array.from({length:sz},()=>names[nameIdx++]||'');
      tables.push({id:rowId+'_'+ci,name:`卓${tIdx+1}`,seats,layout:layoutFor(sz)});
    }
    if(tables.length)rows.push({id:rowId,tables});
  }
  render();
  showToast(`${Math.min(nameIdx,names.length)}人を割り当てました`,'success');
}

function reshuffleAssign(){
  const names=[];
  rows.forEach(row=>row.tables.forEach(t=>{
    if(lockedTables[t.id])return;
    t.seats.forEach((s,si)=>{if(!pinnedSeats[pk(row.id,t.id,si)]&&s)names.push(s);});
  }));
  for(let i=names.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[names[i],names[j]]=[names[j],names[i]];}
  let idx=0;
  rows.forEach(row=>row.tables.forEach(t=>{
    if(lockedTables[t.id])return;
    t.seats=t.seats.map((s,si)=>pinnedSeats[pk(row.id,t.id,si)]?s:(s?names[idx++]||'':''));
  }));
  render();showToast('再シャッフルしました 🔀','success');
}

// ── Manual ────────────────────────────────────────────
function addRowManual(){
  const cols=parseInt(document.getElementById('manualCols').value)||4;
  const s=parseInt(document.getElementById('manualSeats').value)||6;
  const rowId=Date.now()+Math.random();
  rows.push({id:rowId,tables:Array.from({length:cols},(_,i)=>({
    id:rowId+'_'+i,name:`卓${totalT()+i+1}`,seats:Array.from({length:s},()=>''),layout:layoutFor(s),
  }))});
  render();
}

function totalT(){return rows.reduce((a,r)=>a+r.tables.length,0);}
function pk(rId,tId,si){return`${rId}__${tId}__${si}`;}

// ── Render ────────────────────────────────────────────
function render(){
  const container=document.getElementById('venueRows');
  container.innerHTML='';
  rows.forEach((row,ri)=>{
    const block=document.createElement('div');block.className='row-block';
    const hdr=document.createElement('div');hdr.className='row-header';
    const filled=row.tables.reduce((a,t)=>a+t.seats.filter(s=>s).length,0);
    const total=row.tables.reduce((a,t)=>a+t.seats.length,0);
    hdr.innerHTML=`<span class="row-label">ROW ${ri+1}</span><span class="row-info">${row.tables.length}卓 · ${filled}/${total}</span>`;
    const acts=document.createElement('div');acts.className='row-actions';
    acts.appendChild(mkBtn('+卓','sm ghost',()=>{
      const s=parseInt(document.getElementById('manualSeats').value)||6;
      row.tables.push({id:Date.now()+'_'+Math.random(),name:`卓${totalT()+1}`,seats:Array.from({length:s},()=>''),layout:layoutFor(s)});
      render();
    }));
    acts.appendChild(mkBtn('列を削除','sm danger',()=>{rows=rows.filter(r=>r.id!==row.id);render();}));
    hdr.appendChild(acts);block.appendChild(hdr);
    const td=document.createElement('div');td.className='row-tables';
    row.tables.forEach(t=>td.appendChild(makeCard(t,row)));
    block.appendChild(td);container.appendChild(block);
  });
  updateStats();
  if(participants.length)renderParticipants();
  updateListView();scheduleSave();
}

function makeCard(t,row){
  const card=document.createElement('div');
  card.className='table-card'+(lockedTables[t.id]?' locked-table':'');
  if(mode==='tswap'&&tSwapSrc&&tSwapSrc.tableId===t.id)card.style.outline='2px solid var(--lock-color)';

  const head=document.createElement('div');head.className='tc-head';
  const ni=document.createElement('input');ni.className='tc-name';ni.value=t.name;ni.title=t.name;
  ni.onchange=e=>{t.name=e.target.value;updateListView();};
  const lb=document.createElement('button');lb.className='tc-btn lock-btn'+(lockedTables[t.id]?' active':'');
  lb.textContent=lockedTables[t.id]?'🔒':'🔓';
  lb.onclick=()=>{lockedTables[t.id]=!lockedTables[t.id];render();};
  const db=document.createElement('button');db.className='tc-btn del';db.textContent='×';
  db.onclick=()=>{row.tables=row.tables.filter(x=>x.id!==t.id);render();};
  head.appendChild(ni);head.appendChild(lb);head.appendChild(db);card.appendChild(head);

  const cfg=LAYOUTS[t.layout]||{c:2,r:3};
  const sg=document.createElement('div');sg.className='seats-grid';
  sg.style.gridTemplateColumns=`repeat(${cfg.c},58px)`;

  t.seats.forEach((name,si)=>{
    const key=pk(row.id,t.id,si);const isPinned=!!pinnedSeats[key];
    const seat=document.createElement('div');
    let cls='seat'+(name?' filled':'')+(isPinned?' pinned':'');
    if(mode==='swap'&&swapSrc&&swapSrc.tableId===t.id&&swapSrc.si===si)cls+=' swap-src';
    seat.className=cls;
    if(name){
      const sp=document.createElement('span');
      sp.className='seat-name'+(name.length>8?' long':'');
      sp.textContent=name;seat.appendChild(sp);
    }else{
      seat.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px;height:10px;opacity:.3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    }
    seat.onclick=e=>{
      e.stopPropagation();
      if(mode==='swap'){handleSwap(row.id,t.id,si,name);return;}
      if(mode==='tswap'){handleTSwap(row,t);return;}
      openEdit(e,t,si,row.id);
    };
    seat.addEventListener('dragover',e=>{e.preventDefault();seat.classList.add('drop-target');});
    seat.addEventListener('dragleave',()=>seat.classList.remove('drop-target'));
    seat.addEventListener('drop',e=>{
      e.preventDefault();seat.classList.remove('drop-target');
      if(dragParticipant&&!lockedTables[t.id]&&!pinnedSeats[key]){t.seats[si]=dragParticipant;dragParticipant=null;render();}
    });
    sg.appendChild(seat);
  });
  card.appendChild(sg);
  card.addEventListener('click',()=>{if(mode==='tswap')handleTSwap(row,t);});

  const foot=document.createElement('div');foot.className='tc-footer';
  const sel=document.createElement('select');sel.className='tc-layout-sel';
  Object.keys(LAYOUTS).forEach(k=>{
    const o=document.createElement('option');o.value=k;o.textContent=k;if(k===t.layout)o.selected=true;sel.appendChild(o);
  });
  sel.onchange=e=>{
    if(lockedTables[t.id])return;
    t.layout=e.target.value;const n=LAYOUTS[t.layout].c*LAYOUTS[t.layout].r;
    while(t.seats.length<n)t.seats.push('');if(t.seats.length>n)t.seats=t.seats.slice(0,n);render();
  };
  foot.appendChild(sel);
  foot.appendChild(mkBtn('+席','sm ghost',()=>{if(!lockedTables[t.id]){t.seats.push('');render();}}));
  foot.appendChild(mkBtn('-席','sm ghost',()=>{if(!lockedTables[t.id]&&t.seats.length>1){t.seats.pop();render();}}));
  card.appendChild(foot);return card;
}

function mkBtn(text,cls,fn){const b=document.createElement('button');b.className='btn '+cls;b.textContent=text;b.onclick=fn;return b;}

// ── Modes ─────────────────────────────────────────────
function startMode(m){
  mode=m;swapSrc=null;tSwapSrc=null;closeEdit();
  document.getElementById('swapBanner').classList.toggle('active',m==='swap');
  document.getElementById('tSwapBanner').classList.toggle('active',m==='tswap');
  document.getElementById('swapStatus').textContent='1人目の席をクリック';
  document.getElementById('tSwapStatus').textContent='入れ替える卓をクリック';
  render();
}
function cancelMode(){
  mode=null;swapSrc=null;tSwapSrc=null;
  document.getElementById('swapBanner').classList.remove('active');
  document.getElementById('tSwapBanner').classList.remove('active');
  render();
}
function handleSwap(rowId,tableId,si,name){
  if(!swapSrc){
    swapSrc={rowId,tableId,si};
    document.getElementById('swapStatus').textContent=`「${name||'空席'}」→ 2人目をクリック`;
    render();
  }else{
    const sRow=rows.find(r=>r.id==swapSrc.rowId);
    const sT=sRow?.tables.find(t=>t.id==swapSrc.tableId);
    const dRow=rows.find(r=>r.tables.some(t=>t.id==tableId));
    const dT=dRow?.tables.find(t=>t.id==tableId);
    if(sT&&dT){
      const tmp=sT.seats[swapSrc.si];sT.seats[swapSrc.si]=dT.seats[si];dT.seats[si]=tmp;
      const k1=pk(swapSrc.rowId,swapSrc.tableId,swapSrc.si),k2=pk(rowId,tableId,si);
      const p1=!!pinnedSeats[k1],p2=!!pinnedSeats[k2];
      if(p1)pinnedSeats[k2]=true;else delete pinnedSeats[k2];
      if(p2)pinnedSeats[k1]=true;else delete pinnedSeats[k1];
      showToast('席を入れ替えました ⇄','success');
    }
    swapSrc=null;cancelMode();
  }
}
function handleTSwap(row,t){
  if(!tSwapSrc){
    tSwapSrc={rowId:row.id,tableId:t.id};
    document.getElementById('tSwapStatus').textContent=`「${t.name}」→ 2つ目の卓をクリック`;
    render();
  }else{
    const sRow=rows.find(r=>r.id==tSwapSrc.rowId);
    const sT=sRow?.tables.find(x=>x.id==tSwapSrc.tableId);
    if(sT&&sT.id!==t.id){
      const tmpS=[...sT.seats];sT.seats=[...t.seats];t.seats=tmpS;
      const maxSi=Math.max(sT.seats.length,t.seats.length);
      for(let si=0;si<maxSi;si++){
        const k1=pk(tSwapSrc.rowId,tSwapSrc.tableId,si),k2=pk(row.id,t.id,si);
        const p1=!!pinnedSeats[k1],p2=!!pinnedSeats[k2];
        if(p1)pinnedSeats[k2]=true;else delete pinnedSeats[k2];
        if(p2)pinnedSeats[k1]=true;else delete pinnedSeats[k1];
      }
      showToast(`「${sT.name}」と「${t.name}」を入れ替えました 🔄`,'success');
    }
    tSwapSrc=null;cancelMode();
  }
}

// ── Edit popup ────────────────────────────────────────
function openEdit(e,t,si,rowId){
  if(lockedTables[t.id]){showToast('この卓はロックされています 🔒','error');return;}
  editTarget={t,si,rowId};
  const popup=document.getElementById('editPopup');
  const inp=document.getElementById('editInput');
  document.getElementById('editPopupTitle').textContent=`${t.name} · ${si+1}番席`;
  inp.value=t.seats[si];
  document.getElementById('pinBtn').classList.toggle('active',!!pinnedSeats[pk(rowId,t.id,si)]);
  const placed=getAllPlaced();
  const unplaced=participants.filter(p=>!placed.includes(p.name)||p.name===t.seats[si]);
  const sl=document.getElementById('suggestList');sl.innerHTML='';
  unplaced.slice(0,8).forEach(p=>{
    const item=document.createElement('div');item.className='suggest-item';item.textContent=p.name;
    item.onclick=()=>{inp.value=p.name;confirmEdit();};sl.appendChild(item);
  });
  popup.style.display='block';
  const ph=popup.offsetHeight||220;
  const rect=e.target.getBoundingClientRect();
  let top=rect.bottom+6;if(top+ph>window.innerHeight)top=rect.top-ph-6;
  popup.style.top=Math.max(8,top)+'px';
  popup.style.left=Math.min(rect.left,window.innerWidth-255)+'px';
  setTimeout(()=>inp.focus(),10);
}
function togglePin(){
  if(!editTarget)return;
  const key=pk(editTarget.rowId,editTarget.t.id,editTarget.si);
  if(pinnedSeats[key])delete pinnedSeats[key];else pinnedSeats[key]=true;
  document.getElementById('pinBtn').classList.toggle('active',!!pinnedSeats[key]);
}
function confirmEdit(){if(!editTarget)return;editTarget.t.seats[editTarget.si]=document.getElementById('editInput').value.trim();closeEdit();render();}
function clearSeat(){if(!editTarget)return;delete pinnedSeats[pk(editTarget.rowId,editTarget.t.id,editTarget.si)];editTarget.t.seats[editTarget.si]='';closeEdit();render();}
function closeEdit(){document.getElementById('editPopup').style.display='none';editTarget=null;}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&editTarget)confirmEdit();if(e.key==='Escape'){closeEdit();cancelMode();}});
document.addEventListener('click',e=>{if(editTarget&&!document.getElementById('editPopup').contains(e.target))closeEdit();});

// ── Stats ─────────────────────────────────────────────
function updateStats(){
  let tR=rows.length,tT=0,tS=0,fS=0;
  rows.forEach(r=>r.tables.forEach(t=>{tT++;tS+=t.seats.length;fS+=t.seats.filter(s=>s).length;}));
  document.getElementById('statsArea').innerHTML=`
    <div class="stat-card"><div class="num">${tR}</div><div class="lbl">ROWS</div></div>
    <div class="stat-card"><div class="num">${tT}</div><div class="lbl">TABLES</div></div>
    <div class="stat-card accent"><div class="num">${fS}</div><div class="lbl">SEATED</div></div>
    <div class="stat-card"><div class="num">${tS-fS}</div><div class="lbl">OPEN</div></div>`;
}

// ── List view ─────────────────────────────────────────
function updateListView(){
  let html='<table class="list-table"><thead><tr><th>列</th><th>卓名</th><th>席</th><th>名前</th><th>固定</th><th>状態</th></tr></thead><tbody>';
  rows.forEach((row,ri)=>{
    row.tables.forEach(t=>{
      t.seats.forEach((name,si)=>{
        const key=pk(row.id,t.id,si);
        html+=`<tr><td>ROW ${ri+1}</td><td>${t.name}${lockedTables[t.id]?'🔒':''}</td><td>${si+1}</td><td>${name||'—'}</td><td>${pinnedSeats[key]?'<span class="badge pin">📍</span>':''}</td><td><span class="badge ${name?'filled':'empty'}">${name?'着席':'空席'}</span></td></tr>`;
      });
    });
  });
  html+='</tbody></table>';
  document.getElementById('listViewArea').innerHTML=html;
}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['layout','list'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='list')updateListView();
}

// ── BG ────────────────────────────────────────────────
function setBg(el){const c=el.dataset.color;document.documentElement.style.setProperty('--user-bg',c);document.getElementById('bgColorPicker').value=c;document.getElementById('bgColorText').value=c;document.querySelectorAll('.bg-swatch').forEach(s=>s.classList.remove('active'));el.classList.add('active');}
function setBgPicker(v){document.documentElement.style.setProperty('--user-bg',v);document.getElementById('bgColorText').value=v;document.querySelectorAll('.bg-swatch').forEach(s=>s.classList.remove('active'));}
function setBgText(v){if(/^#[0-9a-fA-F]{3,6}$/.test(v)){document.documentElement.style.setProperty('--user-bg',v);document.getElementById('bgColorPicker').value=v;document.querySelectorAll('.bg-swatch').forEach(s=>s.classList.remove('active'));}}

// ── Misc ──────────────────────────────────────────────
function clearAllNames(){
  if(!confirm('固定席以外の全名前を削除しますか？'))return;
  rows.forEach(row=>row.tables.forEach(t=>{if(lockedTables[t.id])return;t.seats=t.seats.map((s,si)=>pinnedSeats[pk(row.id,t.id,si)]?s:'');}));
  render();
}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');setTimeout(()=>t.className='toast',2600);}

// ── CSV export/restore ────────────────────────────────
function exportCSV(){
  let csv='#NEXSEAT_V4\n';
  csv+='#LAYOUT:'+JSON.stringify(rows.map(row=>({id:row.id,tables:row.tables.map(t=>({id:t.id,name:t.name,layout:t.layout,seatCount:t.seats.length,locked:!!lockedTables[t.id]}))})))+'\n';
  csv+='#PINS:'+JSON.stringify(pinnedSeats)+'\n';
  csv+='列,卓名,席番号,参加者名,固定\n';
  rows.forEach((row,ri)=>row.tables.forEach(t=>t.seats.forEach((name,si)=>{
    csv+=`ROW${ri+1},"${t.name}",${si+1},"${name}",${pinnedSeats[pk(row.id,t.id,si)]?'1':'0'}\n`;
  })));
  const now=new Date();const ds=`${now.getMonth()+1}${now.getDate()}_${now.getHours()}${String(now.getMinutes()).padStart(2,'0')}`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`座席表_${ds}.csv`;a.click();
  showToast('CSVを保存しました','success');
}

function restoreFromCSV(e){
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const text=ev.target.result.replace(/^\uFEFF/,'');
      const lines=text.split('\n');
      if(!lines[0].startsWith('#NEXSEAT_V')){showToast('NexSeatのCSVではありません','error');e.target.value='';return;}
      const layoutData=JSON.parse(lines[1].replace('#LAYOUT:',''));
      let savedPins={};
      if(lines[2]?.startsWith('#PINS:'))try{savedPins=JSON.parse(lines[2].replace('#PINS:',''));}catch(e2){}
      const dataStart=lines.findIndex(l=>l.startsWith('列,'))+1;
      const seatMap={};
      for(let i=dataStart;i<lines.length;i++){const c=splitCSV(lines[i]);if(c.length>=4)seatMap[`${c[0]}_${c[1]}_${c[2]}`]=c[3];}
      lockedTables={};
      rows=layoutData.map((rd2,ri)=>({id:rd2.id,tables:rd2.tables.map(td=>{
        if(td.locked)lockedTables[td.id]=true;
        return{id:td.id,name:td.name,layout:td.layout,seats:Array.from({length:td.seatCount},(_,si)=>seatMap[`ROW${ri+1}_${td.name}_${si+1}`]||'')};
      })}));
      pinnedSeats=savedPins;render();showToast('座席表を復元しました！','success');
    }catch(err){showToast('CSV読み込みエラー','error');console.error(err);}
    e.target.value='';
  };
  rd.readAsText(file,'UTF-8');
}

// ── Autosave ──────────────────────────────────────────
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(LS_KEY,JSON.stringify({rows,participants,pinnedSeats,lockedTables,savedAt:new Date().toISOString()}));
      const d=new Date();
      document.getElementById('autosave-label').textContent=`saved ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }catch(e){}
  },1500);
}

// ── Init ─────────────────────────────────────────────
(function init(){
  try{
    const saved=localStorage.getItem(LS_KEY);
    if(saved){
      const data=JSON.parse(saved);
      if(data.rows?.length>0){
        rows=data.rows;participants=data.participants||[];pinnedSeats=data.pinnedSeats||{};lockedTables=data.lockedTables||{};
        render();if(participants.length)renderParticipants();
        const d=new Date(data.savedAt);
        document.getElementById('autosave-label').textContent=`restored ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        showToast('前回の作業を復元しました','success');return;
      }
    }
  }catch(e){}
  const rId=Date.now();
  rows=[
    {id:rId,tables:Array.from({length:4},(_,i)=>({id:rId+'_'+i,name:`卓${i+1}`,seats:Array.from({length:6},()=>''),layout:'2x3'}))},
    {id:rId+1,tables:Array.from({length:4},(_,i)=>({id:(rId+1)+'_'+i,name:`卓${i+5}`,seats:Array.from({length:6},()=>''),layout:'2x3'}))},
  ];
  render();
})();
</script>
