<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSeat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #131318;
  --surface2: #1a1a22;
  --surface3: #22222e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent-dim: rgba(108,92,231,0.14);
  --accent-glow: rgba(108,92,231,0.35);
  --text: #eeecff;
  --text2: #9994b8;
  --text3: #4e4a68;
  --green: #00cec9;
  --green-dim: rgba(0,206,201,0.12);
  --red: #ff7675;
  --red-dim: rgba(255,118,117,0.12);
  --amber: #fdcb6e;
  --amber-dim: rgba(253,203,110,0.12);
  --lock-color: #fd79a8;
  --lock-dim: rgba(253,121,168,0.14);
  --pin-color: #55efc4;
  --pin-dim: rgba(85,239,196,0.14);
  --radius: 8px;
  --radius-lg: 14px;
  --sidebar-w: 270px;
  /* user-customizable */
  --user-bg: #0c0c0f;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--user-bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  transition: background .4s;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(19,19,24,0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: .06em;
  color: var(--text);
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  box-shadow: 0 0 14px var(--accent-glow);
}
.header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  letter-spacing: .04em;
  cursor: pointer;
  transition: all .14s;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.btn.danger { color: var(--red); border-color: rgba(255,118,117,.3); }
.btn.danger:hover { background: var(--red-dim); }
.btn.success { color: var(--green); border-color: rgba(0,206,201,.3); }
.btn.success:hover { background: var(--green-dim); }
.btn.sm { padding: 4px 10px; font-size: 10px; }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--surface2); border-color: var(--border); }
.btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.btn:disabled { opacity: .4; pointer-events: none; }

/* ── Layout ── */
.main { display: flex; height: calc(100vh - 53px); overflow: hidden; }
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.content { flex: 1; overflow-y: auto; padding: 18px 20px; }

/* ── Sidebar sections ── */
.sb-section { padding: 14px 14px; border-bottom: 1px solid var(--border); }
.sb-title {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.field { margin-bottom: 9px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.field input[type=number],
.field input[type=text],
.field select {
  width: 100%;
  padding: 6px 9px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field select option { background: var(--surface2); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

/* ── Assign config ── */
.assign-config {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px;
  margin-bottom: 10px;
}
.assign-config .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.assign-config .row:last-child { margin-bottom: 0; }
.assign-config label { font-size: 11px; color: var(--text2); }
.assign-config input[type=number] {
  width: 52px;
  padding: 4px 6px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-align: center;
}
.assign-config input:focus { outline: none; border-color: var(--accent); }
.assign-preview {
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  padding: 4px 0 2px;
}
.assign-preview span { color: var(--accent2); }

/* ── Drop zone ── */
.dropzone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 16px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .18s;
  margin-bottom: 8px;
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.dropzone-icon { font-size: 22px; margin-bottom: 4px; }
.dropzone p { font-size: 10px; color: var(--text2); line-height: 1.5; }
.dropzone strong { color: var(--accent2); }

/* ── Participant list ── */
.participant-list { max-height: 180px; overflow-y: auto; }
.participant-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 7px;
  border-radius: 6px;
  margin-bottom: 2px;
  background: var(--surface2);
  font-size: 11px;
  color: var(--text);
  cursor: grab;
  transition: background .1s;
  user-select: none;
}
.participant-chip:hover { background: var(--surface3); }
.participant-chip.placed { color: var(--text3); cursor: default; }
.participant-chip.placed .chip-name { text-decoration: line-through; }
.chip-no { font-size: 9px; color: var(--text3); font-family: 'JetBrains Mono', monospace; min-width: 20px; }
.chip-name { flex: 1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chip-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; background: var(--accent-dim); color: var(--accent2); flex-shrink: 0; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 9px;
  border: 1px solid var(--border);
}
.stat-card .num { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.stat-card .lbl { font-size: 9px; color: var(--text3); font-family: 'Syne', sans-serif; letter-spacing: .06em; }
.stat-card.accent { border-color: rgba(108,92,231,.35); background: var(--accent-dim); }
.stat-card.accent .num { color: var(--accent2); }

/* ── BG Customizer ── */
.bg-swatches { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.bg-swatch {
  width: 24px; height: 24px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
}
.bg-swatch:hover, .bg-swatch.active { border-color: var(--accent2); transform: scale(1.1); }
.bg-custom-row { display: flex; gap: 6px; align-items: center; }
.bg-custom-row input[type=color] {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: none;
  cursor: pointer;
  padding: 2px;
}
.bg-custom-row input[type=text] {
  flex: 1;
  padding: 5px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.bg-custom-row input:focus { outline: none; border-color: var(--accent); }

/* ── Venue ── */
.venue-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.venue-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; }
.venue-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.stage-bar {
  background: linear-gradient(90deg, transparent, var(--accent-dim), rgba(162,155,254,.12), var(--accent-dim), transparent);
  border: 1px solid rgba(108,92,231,.25);
  border-radius: var(--radius);
  padding: 7px 16px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  letter-spacing: .18em;
  color: var(--accent2);
  margin-bottom: 14px;
  font-weight: 700;
  text-transform: uppercase;
}

/* ── Row blocks ── */
.row-block {
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color .15s;
}
.row-block:hover { border-color: var(--border2); }
.row-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .08em;
}
.row-seat-count { font-size: 10px; color: var(--text3); }
.row-actions { display: flex; gap: 4px; margin-left: auto; }
.row-tables { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; }

/* ── Table cards ── */
.table-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px;
  transition: border-color .15s, box-shadow .15s;
  position: relative;
}
.table-card:hover { border-color: rgba(108,92,231,.35); }
.table-card.locked-table { border-color: rgba(253,121,168,.35); background: rgba(253,121,168,.04); }
.table-card.locked-table .tc-lock-icon { display: flex; }
.tc-lock-icon {
  display: none;
  position: absolute;
  top: 6px;
  right: 6px;
  width: 14px; height: 14px;
  align-items: center;
  justify-content: center;
  color: var(--lock-color);
  font-size: 10px;
}
.tc-head {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 8px;
}
.tc-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  background: transparent;
  border: none;
  font-family: inherit;
  flex: 1;
  min-width: 0;
  outline: none;
  letter-spacing: .04em;
}
.tc-name:focus { color: var(--text); }
.tc-btn { color: var(--text3); cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 4px; transition: all .1s; background: none; border: none; }
.tc-btn:hover { background: var(--surface3); }
.tc-btn.del:hover { color: var(--red); }
.tc-btn.lock-btn:hover { color: var(--lock-color); }
.tc-btn.lock-btn.active { color: var(--lock-color); }
.seats-grid { display: grid; gap: 4px; }
.seat {
  width: 62px;
  min-height: 38px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  cursor: pointer;
  color: var(--text3);
  transition: all .14s;
  position: relative;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  overflow: hidden;
  line-height: 1.25;
  text-align: center;
  padding: 4px 5px;
  word-break: break-all;
  hyphens: auto;
}
.seat:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
.seat.empty-seat { color: var(--text3); }
.seat.filled {
  background: var(--accent-dim);
  border-color: rgba(108,92,231,.5);
  color: var(--accent2);
  font-size: 9px;
}
.seat.pinned {
  border-color: var(--pin-color) !important;
  background: var(--pin-dim) !important;
  color: var(--pin-color) !important;
}
.seat.pinned::after {
  content: '📍';
  position: absolute;
  top: 1px;
  right: 2px;
  font-size: 7px;
  line-height: 1;
}
.seat.drop-target { border-color: var(--green); background: var(--green-dim); }
.seat.swap-source { border-color: var(--amber); background: var(--amber-dim); animation: pulse-swap .6s ease infinite; }
@keyframes pulse-swap { 0%,100%{box-shadow:0 0 0 0 rgba(253,203,110,.4)} 50%{box-shadow:0 0 0 4px rgba(253,203,110,.0)} }
.seat-name {
  display: block;
  width: 100%;
  word-break: break-all;
  overflow-wrap: break-word;
  line-height: 1.25;
  font-size: 9px;
  /* scale down long names automatically */
}
.seat-name.long { font-size: 8px; letter-spacing: -.2px; }

.tc-footer {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.tc-layout-sel {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
}
.add-table-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-width: 80px;
  min-height: 70px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text3);
  font-size: 10px;
  cursor: pointer;
  transition: all .14s;
  font-family: 'Syne', sans-serif;
}
.add-table-card:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
.add-row-area {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px dashed var(--border);
  margin-top: 4px;
}

/* ── Edit popup ── */
.edit-popup {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 14px;
  z-index: 300;
  min-width: 210px;
  max-width: 260px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  display: none;
}
.edit-popup-title { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--text2); margin-bottom: 10px; font-weight: 600; }
.edit-popup input[type=text] {
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  margin-bottom: 8px;
}
.edit-popup input:focus { outline: none; border-color: var(--accent); }
.edit-popup-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.edit-popup-opts { display: flex; gap: 5px; margin-bottom: 8px; }
.opt-btn {
  flex: 1;
  padding: 5px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  transition: all .12s;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}
.opt-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
.opt-btn.active { border-color: var(--pin-color); background: var(--pin-dim); color: var(--pin-color); }
.suggest-list { max-height: 110px; overflow-y: auto; margin-bottom: 6px; }
.suggest-item {
  padding: 4px 7px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: background .1s;
}
.suggest-item:hover { background: var(--accent-dim); color: var(--accent2); }

/* ── Swap mode banner ── */
.swap-banner {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--amber);
  border-radius: var(--radius-lg);
  padding: 8px 16px;
  font-size: 12px;
  color: var(--amber);
  z-index: 200;
  display: none;
  align-items: center;
  gap: 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,.5);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}
.swap-banner.active { display: flex; }

/* ── Tabs ── */
.tabs { display: flex; gap: 2px; margin-bottom: 14px; }
.tab-btn {
  padding: 6px 15px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: 'Syne', sans-serif;
  letter-spacing: .05em;
  transition: all .14s;
}
.tab-btn.active { background: var(--accent-dim); color: var(--accent2); }
.tab-btn:hover:not(.active) { color: var(--text2); background: var(--surface2); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── List view ── */
.list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.list-table th {
  text-align: left;
  padding: 7px 10px;
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.list-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
}
.list-table tr:hover td { background: var(--surface2); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
}
.badge.filled { background: var(--accent-dim); color: var(--accent2); }
.badge.empty { background: var(--surface2); color: var(--text3); }
.badge.pin { background: var(--pin-dim); color: var(--pin-color); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 9px 14px;
  font-size: 12px;
  color: var(--text);
  z-index: 999;
  opacity: 0;
  transform: translateY(8px);
  transition: all .2s;
  pointer-events: none;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: rgba(0,206,201,.4); color: var(--green); }
.toast.error { border-color: rgba(255,118,117,.4); color: var(--red); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* ── Print ── */
@media print {
  body { background: #fff !important; color: #000; }
  .header, .sidebar, .add-row-area, .row-actions, .tc-footer, .venue-header, .tc-btn, .tc-lock-icon, .swap-banner, .tabs, #tab-list { display: none !important; }
  .main { display: block; height: auto; overflow: visible; }
  .content { padding: 0; overflow: visible; height: auto; }
  .row-block { border: 1px solid #ddd; break-inside: avoid; margin-bottom: 8px; }
  .row-header { background: #f5f5f5; }
  .table-card { background: #fafafa; border: 1px solid #ddd; break-inside: avoid; }
  .seat { border: 1px solid #aaa; background: #f0f0f0; color: #333; font-size: 8px; border-radius: 5px; }
  .seat.filled { background: #ede8ff; border-color: #9b8eff; color: #3d2fb3; }

}

<script>
// ── State ──────────────────────────────────────────────────
let rows = [];
let participants = [];
let pinnedSeats = {}; // key: "rowId_tableId_seatIdx" => true
let lockedTables = {}; // key: tableId => true
let editTarget = null;
let dragParticipant = null;
let swapMode = false;
let swapSource = null; // {rowId, tableId, seatIdx}
const LS_KEY = 'nexseat_v2_autosave';
let autosaveTimer = null;

const LAYOUTS = {
  '2x3':{c:2,r:3},'3x2':{c:3,r:2},
  '1x6':{c:1,r:6},'6x1':{c:6,r:1},
  '2x2':{c:2,r:2},'4x1':{c:4,r:1},
  '3x3':{c:3,r:3},'2x4':{c:2,r:4},'4x2':{c:4,r:2},
};

// ── Preview ────────────────────────────────────────────────
function updatePreview() {
  const s = parseInt(document.getElementById('seatsPerTable').value) || 6;
  const t = parseInt(document.getElementById('tablesPerRow').value) || 4;
  const maxR = parseInt(document.getElementById('maxRows').value) || 10;
  const n = participants.filter(p => !p.placed).length || 0;
  if (n === 0) {
    document.getElementById('assignPreview').innerHTML = `<span>${s}席 × ${t}卓 × ?列</span>`;
    return;
  }
  const totalSeats = s * t;
  const neededRows = Math.ceil(n / totalSeats);
  const actualRows = Math.min(neededRows, maxR);
  document.getElementById('assignPreview').innerHTML =
    `${n}人 → <span>${actualRows}列 × ${t}卓 × ${s}席</span>`;
}
['seatsPerTable','tablesPerRow','maxRows'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

// ── CSV Parse (Tonemel + start.gg) ────────────────────────
function detectFormat(headers) {
  // Tonemel: has エントリー名 or ステータス
  if (headers.some(h => h.includes('エントリー名') || h.includes('ステータス'))) return 'tonemel';
  // start.gg: has Name, Gamertag, etc.
  if (headers.some(h => h.toLowerCase().includes('name') || h.toLowerCase().includes('gamertag') || h.toLowerCase().includes('participant'))) return 'startgg';
  return 'unknown';
}

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let text = ev.target.result;
    // Try UTF-8 first; if garbled (start.gg raw UTF-16), re-read as UTF-16
    if (isGarbled(text)) {
      const r2 = new FileReader();
      r2.onload = ev2 => parseCSVAuto(ev2.target.result);
      r2.readAsText(file, 'UTF-16LE');
    } else {
      parseCSVAuto(text);
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function isGarbled(text) {
  // Heuristic: lots of replacement chars or very few recognizable Japanese chars in first 500 chars
  const sample = text.slice(0, 500);
  const repCount = (sample.match(/\uFFFD/g) || []).length;
  return repCount > 5;
}

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let text = ev.target.result;
    if (isGarbled(text)) {
      const r2 = new FileReader();
      r2.onload = ev2 => parseCSVAuto(ev2.target.result);
      r2.readAsText(file, 'UTF-16LE');
    } else {
      parseCSVAuto(text);
    }
  };
  reader.readAsText(file, 'UTF-8');
});

function parseCSVAuto(text) {
  text = text.replace(/^\uFEFF/, '').replace(/^\xFF\xFE/, '');
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  if (lines.length < 2) { showToast('CSVが読み込めませんでした', 'error'); return; }
  const headers = splitCSVLine(lines[0]);
  const fmt = detectFormat(headers);
  let out = [];
  if (fmt === 'tonemel') out = parseTonemel(headers, lines);
  else out = parseStartGG(headers, lines);

  participants = out;
  updatePreview();
  renderParticipants();
  showToast(`${out.length}人を読み込みました (${fmt === 'tonemel' ? 'Tonemel' : 'start.gg'})`, 'success');
}

function parseTonemel(headers, lines) {
  const idxStatus = headers.indexOf('ステータス');
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    const status = cols[idxStatus] || '';
    if (status !== '出場') continue;
    let name = '';
    for (let j = 2; j < Math.min(cols.length, 15); j++) {
      const v = cols[j].trim();
      if (v && !v.includes('はい') && !v.includes('いいえ') && !v.startsWith('@') && !v.match(/^\d{4}-/) && v.length > 0) {
        name = v; break;
      }
    }
    if (!name) name = cols[2] || cols[1] || '不明';
    out.push({ name: name.trim(), placed: false });
  }
  return out;
}

function parseStartGG(headers, lines) {
  // start.gg exports: Participant Id, Name, Gamertag, Prefix, etc.
  const lh = headers.map(h => h.toLowerCase());
  // Priority: Gamertag > Name > Participant Name
  let nameIdx = lh.findIndex(h => h.includes('gamertag'));
  if (nameIdx < 0) nameIdx = lh.findIndex(h => h === 'name' || h.includes('participant name'));
  if (nameIdx < 0) nameIdx = lh.findIndex(h => h.includes('name'));
  if (nameIdx < 0) nameIdx = 1;
  const statusIdx = lh.findIndex(h => h.includes('status') || h.includes('checked'));
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols.length || !cols[nameIdx]) continue;
    // If there's a status column, try to filter checked-in only; otherwise take all
    if (statusIdx >= 0) {
      const s = (cols[statusIdx] || '').toLowerCase();
      if (s && !s.includes('check') && !s.includes('attend') && !s.includes('true') && !s.includes('1') && !s.includes('yes') && s !== '') {
        // skip clearly non-active entries only if column exists and has meaningful values
      }
    }
    const name = cols[nameIdx].trim();
    if (!name) continue;
    out.push({ name, placed: false });
  }
  return out;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

// ── Participants render ──────────────────────────────────────
function renderParticipants() {
  const area = document.getElementById('participantArea');
  const list = document.getElementById('participantList');
  const count = document.getElementById('participantCount');
  area.style.display = 'block';
  const placed = getAllPlacedNames();
  participants.forEach(p => { p.placed = placed.includes(p.name); });
  const unplaced = participants.filter(p => !p.placed).length;
  count.textContent = `${unplaced}未配置 / ${participants.length}人`;
  list.innerHTML = '';
  participants.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'participant-chip' + (p.placed ? ' placed' : '');
    div.draggable = !p.placed;
    const no = document.createElement('span');
    no.className = 'chip-no';
    no.textContent = i + 1;
    const nm = document.createElement('span');
    nm.className = 'chip-name';
    nm.textContent = p.name;
    nm.title = p.name;
    div.appendChild(no);
    div.appendChild(nm);
    if (p.placed) {
      const badge = document.createElement('span');
      badge.className = 'chip-badge';
      badge.textContent = '✓';
      div.appendChild(badge);
    }
    if (!p.placed) {
      div.addEventListener('dragstart', e => {
        dragParticipant = p.name;
        e.dataTransfer.effectAllowed = 'copy';
      });
      div.addEventListener('dragend', () => { dragParticipant = null; });
    }
    list.appendChild(div);
  });
  updatePreview();
}

function getAllPlacedNames() {
  const names = [];
  rows.forEach(r => r.tables.forEach(t => t.seats.forEach(s => { if (s) names.push(s); })));
  return names;
}

// ── Auto-assign ──────────────────────────────────────────────
function autoAssign() {
  const s = parseInt(document.getElementById('seatsPerTable').value) || 6;
  const t = parseInt(document.getElementById('tablesPerRow').value) || 4;
  const maxR = parseInt(document.getElementById('maxRows').value) || 10;
  const layout = document.getElementById('defLayout').value;

  const unplaced = participants.filter(p => !p.placed).map(p => p.name);
  if (unplaced.length === 0) { showToast('配置できる参加者がいません', 'error'); return; }

  // Build needed rows
  const neededRows = Math.min(Math.ceil(unplaced.length / (s * t)), maxR);
  // Clear existing non-pinned seats first? No – append to empty seats, respect pins
  // First, fill existing empty non-locked seats
  let idx = 0;
  rows.forEach(row => {
    row.tables.forEach(table => {
      if (lockedTables[table.id]) return;
      table.seats = table.seats.map((seat, si) => {
        const pk = pinKey(row.id, table.id, si);
        if (pinnedSeats[pk]) return seat; // keep pinned
        if (!seat && idx < unplaced.length) return unplaced[idx++];
        return seat;
      });
    });
  });

  // Add new rows if needed
  while (idx < unplaced.length && rows.length < rows.length + neededRows) {
    const newRow = buildRow(t, s, layout);
    rows.push(newRow);
    newRow.tables.forEach(table => {
      table.seats = table.seats.map((_, si) => {
        if (idx < unplaced.length) return unplaced[idx++];
        return '';
      });
    });
  }
  // If still have unplaced, add more rows
  let safety = 0;
  while (idx < unplaced.length && safety++ < 50) {
    const newRow = buildRow(t, s, layout);
    rows.push(newRow);
    newRow.tables.forEach(table => {
      table.seats = table.seats.map((_, si) => {
        if (idx < unplaced.length) return unplaced[idx++];
        return '';
      });
    });
  }

  render();
  showToast(`${Math.min(idx, unplaced.length)}人を割り当てました`, 'success');
}

function reshuffleAssign() {
  // Collect all non-pinned, non-locked names from existing seats
  const names = [];
  rows.forEach(row => {
    row.tables.forEach(table => {
      if (lockedTables[table.id]) return;
      table.seats.forEach((seat, si) => {
        const pk = pinKey(row.id, table.id, si);
        if (!pinnedSeats[pk] && seat) names.push(seat);
      });
    });
  });
  // Shuffle
  for (let i = names.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [names[i], names[j]] = [names[j], names[i]];
  }
  // Re-assign into same seats
  let idx = 0;
  rows.forEach(row => {
    row.tables.forEach(table => {
      if (lockedTables[table.id]) return;
      table.seats = table.seats.map((seat, si) => {
        const pk = pinKey(row.id, table.id, si);
        if (pinnedSeats[pk]) return seat;
        if (seat) return names[idx++] || '';
        return '';
      });
    });
  });
  render();
  showToast('再シャッフルしました 🔀', 'success');
}

function buildRow(cols, seatsPerTable, layout) {
  const cfg = LAYOUTS[layout] || {c:2,r:3};
  const seatCount = cfg.c * cfg.r;
  const id = Date.now() + Math.random();
  const tables = Array.from({length: cols}, (_, i) => ({
    id: id + '_' + i,
    name: `卓${totalTables() + i + 1}`,
    seats: Array.from({length: seatCount}, () => ''),
    layout,
  }));
  return {id, tables};
}

function totalTables() { return rows.reduce((a, r) => a + r.tables.length, 0); }

// ── Pin key helper ────────────────────────────────────────────
function pinKey(rowId, tableId, seatIdx) { return `${rowId}__${tableId}__${seatIdx}`; }

// ── Add row manually ─────────────────────────────────────────
function addRowManual() {
  const cols = parseInt(document.getElementById('manualCols').value) || 4;
  const seats = parseInt(document.getElementById('manualSeats').value) || 6;
  const layout = document.getElementById('defLayout').value;
  const cfg = LAYOUTS[layout] || {c:2,r:3};
  const seatCount = cfg.c * cfg.r;
  const row = buildRow(cols, seatCount, layout);
  // override seat count with manual
  row.tables.forEach(t => { t.seats = Array.from({length: seats}, () => ''); });
  rows.push(row);
  render();
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const container = document.getElementById('venueRows');
  container.innerHTML = '';
  rows.forEach((row, ri) => {
    const block = document.createElement('div');
    block.className = 'row-block';

    const hdr = document.createElement('div');
    hdr.className = 'row-header';
    const lbl = document.createElement('span');
    lbl.className = 'row-label';
    lbl.textContent = `ROW ${ri + 1}`;
    const sc = document.createElement('span');
    sc.className = 'row-seat-count';
    const filled = row.tables.reduce((a,t)=>a+t.seats.filter(s=>s).length,0);
    const total = row.tables.reduce((a,t)=>a+t.seats.length,0);
    sc.textContent = `${row.tables.length}卓 · ${filled}/${total}`;
    const acts = document.createElement('div');
    acts.className = 'row-actions';
    const addT = mkBtn('+ 卓', 'sm ghost', () => {
      const seats = parseInt(document.getElementById('manualSeats').value) || 6;
      const layout = document.getElementById('defLayout').value;
      const cfg = LAYOUTS[layout] || {c:2,r:3};
      row.tables.push({id: Date.now()+'_'+Math.random(), name:`卓${totalTables()+1}`, seats: Array.from({length:seats},()=>''), layout});
      render();
    });
    const delRow = mkBtn('列を削除', 'sm danger', () => { rows = rows.filter(r => r.id !== row.id); render(); });
    acts.appendChild(addT);
    acts.appendChild(delRow);
    hdr.appendChild(lbl);
    hdr.appendChild(sc);
    hdr.appendChild(acts);
    block.appendChild(hdr);

    const tablesDiv = document.createElement('div');
    tablesDiv.className = 'row-tables';
    row.tables.forEach(t => tablesDiv.appendChild(makeTableCard(t, row)));

    block.appendChild(tablesDiv);
    container.appendChild(block);
  });
  updateStats();
  if (participants.length) renderParticipants();
  updateListView();
  scheduleAutosave();
}

function makeTableCard(t, row) {
  const card = document.createElement('div');
  card.className = 'table-card' + (lockedTables[t.id] ? ' locked-table' : '');

  // Lock icon (display only)
  const lockIcon = document.createElement('div');
  lockIcon.className = 'tc-lock-icon';
  lockIcon.textContent = '🔒';
  card.appendChild(lockIcon);

  const head = document.createElement('div');
  head.className = 'tc-head';

  const nameInp = document.createElement('input');
  nameInp.className = 'tc-name';
  nameInp.value = t.name;
  nameInp.title = t.name;
  nameInp.onchange = e => { t.name = e.target.value; updateListView(); };

  // Lock table button
  const lockBtn = document.createElement('button');
  lockBtn.className = 'tc-btn lock-btn' + (lockedTables[t.id] ? ' active' : '');
  lockBtn.title = lockedTables[t.id] ? 'ロック解除' : '卓をロック';
  lockBtn.textContent = lockedTables[t.id] ? '🔒' : '🔓';
  lockBtn.onclick = () => {
    lockedTables[t.id] = !lockedTables[t.id];
    render();
  };

  const delBtn = document.createElement('button');
  delBtn.className = 'tc-btn del';
  delBtn.textContent = '×';
  delBtn.title = '卓を削除';
  delBtn.onclick = () => { row.tables = row.tables.filter(x => x.id !== t.id); render(); };

  head.appendChild(nameInp);
  head.appendChild(lockBtn);
  head.appendChild(delBtn);
  card.appendChild(head);

  // Seats grid
  const cfg = LAYOUTS[t.layout] || {c:2,r:3};
  const sg = document.createElement('div');
  sg.className = 'seats-grid';
  sg.style.gridTemplateColumns = `repeat(${cfg.c}, 62px)`;

  t.seats.forEach((name, si) => {
    const pk = pinKey(row.id, t.id, si);
    const isPinned = !!pinnedSeats[pk];
    const seat = document.createElement('div');
    let cls = 'seat';
    if (name) cls += ' filled';
    else cls += ' empty-seat';
    if (isPinned) cls += ' pinned';
    seat.className = cls;

    if (name) {
      // Show full name — wrap naturally, shrink font for long names
      const nameSpan = document.createElement('span');
      nameSpan.className = 'seat-name' + (name.length > 8 ? ' long' : '');
      nameSpan.textContent = name;
      seat.appendChild(nameSpan);
    } else {
      seat.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px;height:10px;opacity:.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    }

    seat.onclick = e => {
      e.stopPropagation();
      if (swapMode) {
        handleSwapClick(row.id, t.id, si, name);
        return;
      }
      openEdit(e, t, si, row.id);
    };

    // Swap highlight
    if (swapMode && swapSource && swapSource.tableId === t.id && swapSource.seatIdx === si) {
      seat.classList.add('swap-source');
    }

    // Drag from participant list
    seat.addEventListener('dragover', e => { e.preventDefault(); seat.classList.add('drop-target'); });
    seat.addEventListener('dragleave', () => seat.classList.remove('drop-target'));
    seat.addEventListener('drop', e => {
      e.preventDefault();
      seat.classList.remove('drop-target');
      if (dragParticipant && !lockedTables[t.id]) {
        const pk2 = pinKey(row.id, t.id, si);
        if (!pinnedSeats[pk2]) {
          t.seats[si] = dragParticipant;
          dragParticipant = null;
          render();
        }
      }
    });

    sg.appendChild(seat);
  });
  card.appendChild(sg);

  // Footer
  const foot = document.createElement('div');
  foot.className = 'tc-footer';
  const sel = document.createElement('select');
  sel.className = 'tc-layout-sel';
  Object.keys(LAYOUTS).forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    if (k === t.layout) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = e => {
    if (lockedTables[t.id]) return;
    t.layout = e.target.value;
    const n = LAYOUTS[t.layout].c * LAYOUTS[t.layout].r;
    while (t.seats.length < n) t.seats.push('');
    if (t.seats.length > n) t.seats = t.seats.slice(0, n);
    render();
  };
  const addS = mkBtn('+席', 'sm ghost', () => { if (!lockedTables[t.id]) { t.seats.push(''); render(); } });
  const delS = mkBtn('-席', 'sm ghost', () => { if (!lockedTables[t.id] && t.seats.length > 1) { t.seats.pop(); render(); } });
  foot.appendChild(sel);
  foot.appendChild(addS);
  foot.appendChild(delS);
  card.appendChild(foot);
  return card;
}

function mkBtn(text, cls, fn) {
  const b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.textContent = text;
  b.onclick = fn;
  return b;
}

// ── Swap mode ────────────────────────────────────────────────
function startSwapMode() {
  swapMode = true;
  swapSource = null;
  document.getElementById('swapBanner').classList.add('active');
  document.getElementById('swapStatus').textContent = '1人目の席をクリック';
  closeEdit();
  render();
}

function cancelSwap() {
  swapMode = false;
  swapSource = null;
  document.getElementById('swapBanner').classList.remove('active');
  render();
}

function handleSwapClick(rowId, tableId, seatIdx, name) {
  if (!swapSource) {
    swapSource = {rowId, tableId, seatIdx};
    document.getElementById('swapStatus').textContent = `"${name || '空席'}" → 2人目をクリック`;
    render();
  } else {
    // Execute swap
    const srcRow = rows.find(r => r.id == swapSource.rowId);
    const srcTable = srcRow ? srcRow.tables.find(t => t.id == swapSource.tableId) : null;
    const dstRow = rows.find(r => { return r.tables.some(t => t.id == tableId); });
    const dstTable = dstRow ? dstRow.tables.find(t => t.id == tableId) : null;
    if (srcTable && dstTable) {
      const tmp = srcTable.seats[swapSource.seatIdx];
      srcTable.seats[swapSource.seatIdx] = dstTable.seats[seatIdx];
      dstTable.seats[seatIdx] = tmp;
      // Swap pins too
      const pk1 = pinKey(swapSource.rowId, swapSource.tableId, swapSource.seatIdx);
      const pk2 = pinKey(rowId, tableId, seatIdx);
      const p1 = !!pinnedSeats[pk1], p2 = !!pinnedSeats[pk2];
      if (p1) pinnedSeats[pk2] = true; else delete pinnedSeats[pk2];
      if (p2) pinnedSeats[pk1] = true; else delete pinnedSeats[pk1];
      showToast('席を入れ替えました ⇄', 'success');
    }
    swapSource = null;
    cancelSwap();
  }
}

// ── Edit popup ───────────────────────────────────────────────
function openEdit(e, t, si, rowId) {
  if (lockedTables[t.id]) { showToast('この卓はロックされています 🔒', 'error'); return; }
  editTarget = {t, si, rowId};
  const popup = document.getElementById('editPopup');
  const inp = document.getElementById('editInput');
  document.getElementById('editPopupTitle').textContent = `${t.name}・${si+1}番席`;
  inp.value = t.seats[si];

  const pk = pinKey(rowId, t.id, si);
  const pinBtn = document.getElementById('pinBtn');
  pinBtn.classList.toggle('active', !!pinnedSeats[pk]);

  // Suggestions
  const placed = getAllPlacedNames();
  const unplaced = participants.filter(p => !placed.includes(p.name) || p.name === t.seats[si]);
  const sl = document.getElementById('suggestList');
  sl.innerHTML = '';
  unplaced.slice(0, 8).forEach(p => {
    const item = document.createElement('div');
    item.className = 'suggest-item';
    item.textContent = p.name;
    item.onclick = () => { inp.value = p.name; confirmEdit(); };
    sl.appendChild(item);
  });

  // Position popup
  const rect = e.target.getBoundingClientRect();
  popup.style.display = 'block';
  const ph = popup.offsetHeight || 220;
  let top = rect.bottom + 6;
  if (top + ph > window.innerHeight) top = rect.top - ph - 6;
  popup.style.top = Math.max(8, top) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 270) + 'px';
  setTimeout(() => inp.focus(), 10);
}

function togglePinSeat() {
  if (!editTarget) return;
  const pk = pinKey(editTarget.rowId, editTarget.t.id, editTarget.si);
  if (pinnedSeats[pk]) delete pinnedSeats[pk];
  else pinnedSeats[pk] = true;
  document.getElementById('pinBtn').classList.toggle('active', !!pinnedSeats[pk]);
}

function confirmEdit() {
  if (!editTarget) return;
  editTarget.t.seats[editTarget.si] = document.getElementById('editInput').value.trim();
  closeEdit();
  render();
}

function clearSeat() {
  if (!editTarget) return;
  const pk = pinKey(editTarget.rowId, editTarget.t.id, editTarget.si);
  delete pinnedSeats[pk];
  editTarget.t.seats[editTarget.si] = '';
  closeEdit();
  render();
}

function closeEdit() {
  document.getElementById('editPopup').style.display = 'none';
  editTarget = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && editTarget) confirmEdit();
  if (e.key === 'Escape') { closeEdit(); if (swapMode) cancelSwap(); }
});
document.addEventListener('click', e => {
  if (editTarget && !document.getElementById('editPopup').contains(e.target)) closeEdit();
});

// ── Stats ────────────────────────────────────────────────────
function updateStats() {
  let totalR = rows.length, totalT = 0, totalS = 0, filledS = 0;
  rows.forEach(r => r.tables.forEach(t => { totalT++; totalS += t.seats.length; filledS += t.seats.filter(s=>s).length; }));
  const sa = document.getElementById('statsArea');
  sa.innerHTML = `
    <div class="stat-card"><div class="num">${totalR}</div><div class="lbl">ROWS</div></div>
    <div class="stat-card"><div class="num">${totalT}</div><div class="lbl">TABLES</div></div>
    <div class="stat-card accent"><div class="num">${filledS}</div><div class="lbl">SEATED</div></div>
    <div class="stat-card"><div class="num">${totalS - filledS}</div><div class="lbl">OPEN</div></div>`;
}

// ── List view ────────────────────────────────────────────────
function updateListView() {
  const area = document.getElementById('listViewArea');
  let html = '<table class="list-table"><thead><tr><th>列</th><th>卓名</th><th>席</th><th>名前</th><th>固定</th><th>ステータス</th></tr></thead><tbody>';
  rows.forEach((row, ri) => {
    row.tables.forEach(t => {
      t.seats.forEach((name, si) => {
        const pk = pinKey(row.id, t.id, si);
        const isPinned = !!pinnedSeats[pk];
        html += `<tr>
          <td>ROW ${ri+1}</td>
          <td>${t.name}${lockedTables[t.id]?'🔒':''}</td>
          <td>${si+1}</td>
          <td>${name || '—'}</td>
          <td>${isPinned ? '<span class="badge pin">📍固定</span>' : ''}</td>
          <td><span class="badge ${name?'filled':'empty'}">${name?'着席':'空席'}</span></td>
        </tr>`;
      });
    });
  });
  html += '</tbody></table>';
  area.innerHTML = html;
}

// ── Tabs ─────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['layout','list'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'list') updateListView();
}

// ── Background customizer ────────────────────────────────────
function setBg(el) {
  const color = el.dataset.color;
  document.documentElement.style.setProperty('--user-bg', color);
  document.getElementById('bgColorPicker').value = color;
  document.getElementById('bgColorText').value = color;
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}
function setBgFromPicker(val) {
  document.documentElement.style.setProperty('--user-bg', val);
  document.getElementById('bgColorText').value = val;
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
}
function setBgFromText(val) {
  if (/^#[0-9a-fA-F]{3,6}$/.test(val)) {
    document.documentElement.style.setProperty('--user-bg', val);
    document.getElementById('bgColorPicker').value = val;
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  }
}

// ── Export CSV ───────────────────────────────────────────────
function exportCSV() {
  let csv = '#NEXSEAT_V2\n';
  csv += '#LAYOUT:' + JSON.stringify(rows.map(row => ({
    id: row.id,
    tables: row.tables.map(t => ({ id: t.id, name: t.name, layout: t.layout, seatCount: t.seats.length, locked: !!lockedTables[t.id] }))
  }))) + '\n';
  csv += '#PINS:' + JSON.stringify(pinnedSeats) + '\n';
  csv += '列,卓名,席番号,参加者名,固定\n';
  rows.forEach((row, ri) => {
    row.tables.forEach(t => {
      t.seats.forEach((name, si) => {
        const pk = pinKey(row.id, t.id, si);
        csv += `ROW${ri+1},"${t.name}",${si+1},"${name}",${pinnedSeats[pk]?'1':'0'}\n`;
      });
    });
  });
  const now = new Date();
  const ds = `${now.getMonth()+1}${now.getDate()}_${now.getHours()}${String(now.getMinutes()).padStart(2,'0')}`;
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `座席表_${ds}.csv`;
  a.click();
  showToast('座席表CSVを保存しました', 'success');
}

// ── Restore CSV ──────────────────────────────────────────────
function restoreFromCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const rd = new FileReader();
  rd.onload = ev => {
    try {
      const text = ev.target.result.replace(/^\uFEFF/, '');
      const lines = text.split('\n');
      if (!lines[0].startsWith('#NEXSEAT_V')) { showToast('NexSeatのCSVではありません', 'error'); e.target.value=''; return; }
      const layoutLine = lines[1].replace('#LAYOUT:', '');
      const layoutData = JSON.parse(layoutLine);
      // pins
      let savedPins = {};
      if (lines[2] && lines[2].startsWith('#PINS:')) {
        try { savedPins = JSON.parse(lines[2].replace('#PINS:','')); } catch(e2) {}
      }
      // seat data
      const seatMap = {};
      const pinMap = {};
      const dataStart = lines.findIndex(l => l.startsWith('列,')) + 1;
      for (let i = dataStart; i < lines.length; i++) {
        const cols = splitCSVLine(lines[i]);
        if (cols.length < 4) continue;
        const key = `${cols[0]}_${cols[1]}_${cols[2]}`;
        seatMap[key] = cols[3];
        pinMap[key] = cols[4] === '1';
      }
      rows = layoutData.map((rowData, ri) => ({
        id: rowData.id,
        tables: rowData.tables.map((td, ti) => {
          if (td.locked) lockedTables[td.id] = true;
          return {
            id: td.id, name: td.name, layout: td.layout,
            seats: Array.from({length: td.seatCount}, (_, si) => {
              const key = `ROW${ri+1}_${td.name}_${si+1}`;
              return seatMap[key] || '';
            })
          };
        })
      }));
      pinnedSeats = savedPins;
      render();
      showToast('座席表を復元しました！', 'success');
    } catch(err) {
      showToast('CSV読み込みエラー', 'error');
      console.error(err);
    }
    e.target.value = '';
  };
  rd.readAsText(file, 'UTF-8');
}

// ── Misc ─────────────────────────────────────────────────────
function clearAllNames() {
  if (!confirm('固定席以外の全名前を削除しますか？')) return;
  rows.forEach(row => row.tables.forEach(t => {
    if (lockedTables[t.id]) return;
    t.seats = t.seats.map((s, si) => {
      const pk = pinKey(row.id, t.id, si);
      return pinnedSeats[pk] ? s : '';
    });
  }));
  render();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 2600);
}

// ── Autosave ─────────────────────────────────────────────────
function scheduleAutosave() {
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(saveToLS, 1500);
}
function saveToLS() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({rows, participants, pinnedSeats, lockedTables, savedAt: new Date().toISOString()}));
    const d = new Date();
    document.getElementById('autosave-label').textContent =
      `saved ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch(e) {}
}

// ── Init ─────────────────────────────────────────────────────
(function init() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.rows && data.rows.length > 0) {
        rows = data.rows;
        participants = data.participants || [];
        pinnedSeats = data.pinnedSeats || {};
        lockedTables = data.lockedTables || {};
        render();
        if (participants.length) renderParticipants();
        const d = new Date(data.savedAt);
        document.getElementById('autosave-label').textContent =
          `restored ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        showToast('前回の作業を復元しました', 'success');
        return;
      }
    }
  } catch(e) {}
  // Default layout
  const row1 = buildRow(4, 6, '2x3');
  const row2 = buildRow(4, 6, '2x3');
  rows.push(row1, row2);
  render();
})();
</script>
